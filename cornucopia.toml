destination = "db/spotrak-codegen"

[manifest.package]
name = "spotrak-codegen"
publish = false

[manifest.dependencies]
chrono = { version = "0.4", features = ["serde"] }
serde_json = "1"
uuid = { version = "1", features = ["serde"] }
tokio-postgres = {
  version = "0.7",
  features = [
    "with-chrono-0_4",
    "with-serde_json-1",
    "with-uuid-1",
  ],
}
postgres = {
  version = "0.19",
  features = [
    "with-chrono-0_4",
    "with-serde_json-1",
    "with-uuid-1",
  ],
  optional = true,
}
